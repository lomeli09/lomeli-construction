<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lomeli Construction & Remodeling</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="hero">
  <div class="slider">
    <img src="images/slide1.jpg" class="slide active">
    <img src="images/slide2.jpg" class="slide">
    <img src="images/slide3.jpg" class="slide">
    <img src="images/slide4.jpg" class="slide">
    <img src="images/slide5.jpg" class="slide">
  </div>

  <div class="overlay">
    <h1>Every Detail Matters</h1>
    <p>Home Remodeling Projects – Serving Denver & Surrounding Areas</p>
    <a href="#contact" class="btn">Get a Free Quote</a>
  </div>
</section>

<section class="trust">
  <div>25+ Years of Experience</div>
  <div>Fully Insured</div>
  <div>Family Owned</div>
  <div>Denver Local Contractor</div>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p><strong>Jorge Lomeli</strong></p>
  <p>254-522-5804</p>
  <p>lomeli.construction@hotmail.com</p>
</section>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;
setInterval(()=>{
  slides[index].classList.remove('active');
  index=(index+1)%slides.length;
  slides[index].classList.add('active');
},5000);
</script>

</body>
</html>
